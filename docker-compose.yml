services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - price-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    networks:
      - price-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 15

  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pricemonitor
      POSTGRES_USER: ${POSTGRES_USER:-pmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - price-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmonitor}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks:
      - price-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  scraper:
    build: ./scraper
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    networks:
      - price-net
    restart: unless-stopped

  pipeline:
    build: ./pipeline
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - price-net
    restart: unless-stopped

  api:
    build: ./api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - price-net
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    env_file: .env
    ports:
      - "5001:5000"
    depends_on:
      - api
    networks:
      - price-net
    restart: unless-stopped

networks:
  price-net:
    driver: bridge

volumes:
  pg_data:
